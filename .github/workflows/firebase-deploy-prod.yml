name: Deploy to Firebase Hosting (prod)

on:
  push:
    branches: [main]

# Builds the static export and deploys to the live `prelli` Hosting site.
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_FB_API_KEY: ${{ vars.NEXT_PUBLIC_FB_API_KEY }}
          NEXT_PUBLIC_FB_AUTH_DOMAIN: ${{ vars.NEXT_PUBLIC_FB_AUTH_DOMAIN }}
          NEXT_PUBLIC_FB_PROJECT_ID: ${{ vars.NEXT_PUBLIC_FB_PROJECT_ID }}
          NEXT_PUBLIC_FB_STORAGE: ${{ vars.NEXT_PUBLIC_FB_STORAGE }}
          NEXT_PUBLIC_FB_SENDER: ${{ vars.NEXT_PUBLIC_FB_SENDER }}
          NEXT_PUBLIC_FB_APP_ID: ${{ vars.NEXT_PUBLIC_FB_APP_ID }}
          NEXT_PUBLIC_FB_MEASUREMENT: ${{ vars.NEXT_PUBLIC_FB_MEASUREMENT }}

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: prelli
          entryPoint: app
